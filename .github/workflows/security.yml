name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  security-audit:
    name: pip-audit dependency scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on installed packages
        # GHSA-w75w-9qv4-j5xj: dbt-common path traversal CVE — fix requires dbt-core 1.34+ upgrade
        run: pip-audit --local --progress-spinner off --ignore-vuln GHSA-w75w-9qv4-j5xj
